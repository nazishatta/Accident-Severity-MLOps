<svg width="680" height="700" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg" role="img">
<title>MLOps deployment architecture</title>
<desc>Flowchart showing the pipeline from MLflow experiment tracking through DVC, model registry, FastAPI, Docker, Hugging Face Spaces, to GitHub Actions CI/CD.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="700" fill="#ffffff"/>

<g>
<rect x="200" y="30" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="340" y="50" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C">Experiment tracking</text>
<text x="340" y="68" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">MLflow logs 4 trained models</text>
</g>
<line x1="340" y1="86" x2="340" y2="122" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="200" y="122" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="340" y="142" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C">DVC pipeline</text>
<text x="340" y="160" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">data_prep then train then register</text>
</g>
<line x1="340" y1="178" x2="340" y2="214" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<g>
<rect x="200" y="214" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="340" y="234" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#26215C">Model registry</text>
<text x="340" y="252" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#3C3489">LightGBM promoted to production</text>
</g>
<line x1="340" y1="270" x2="340" y2="306" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

<g>
<rect x="200" y="306" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="326" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C">FastAPI backend</text>
<text x="340" y="344" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#085041">/predict with saved label encoders</text>
</g>
<line x1="340" y1="362" x2="340" y2="398" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

<g>
<rect x="200" y="398" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="418" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#04342C">Docker image</text>
<text x="340" y="436" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#085041">FastAPI and Streamlit in one container</text>
</g>
<line x1="340" y1="454" x2="340" y2="490" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow-coral)"/>

<g>
<rect x="200" y="490" width="280" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="340" y="510" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Hugging Face Spaces</text>
<text x="340" y="528" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#712B13">live public deployment</text>
</g>
<line x1="340" y1="546" x2="340" y2="582" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow-coral)"/>

<g>
<rect x="200" y="582" width="280" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="340" y="602" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">GitHub Actions CI/CD</text>
<text x="340" y="620" text-anchor="middle" dominant-baseline="central" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#712B13">auto test and deploy on push</text>
</g>
</svg>
